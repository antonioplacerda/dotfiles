[battery]
full_symbol = "🔋"
charging_symbol = "⚡️"
discharging_symbol = "💀"

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 10
style = "bold red"

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 30
style = "bold yellow"

[directory]
truncation_length = 8
truncation_symbol = "…/"

[custom.foo]
command = "echo 🚀"
when = '[ "$STARSHIP_SHELL" == "zshbatatas" ]'
shell = ["bash", "--noprofile", "--norc"]
